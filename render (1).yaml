services:
  - type: worker
    name: akademik-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: STABILITY_API_KEY
        sync: false
      - key: DB_PATH
        value: /data/bot.db
